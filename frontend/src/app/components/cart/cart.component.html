<div style="width:50%;">
    @for (item of itemsWithNumbers; track item.product.id) {
        <cart-item [canChangeNumber]="true"
            [productAndNumberDto]="item"
            (onNumberChange)="onProductNumberChange($event)"
        ></cart-item>
    } @empty {
        Корзина пуста
    }
    <p class="right">
        Итого: {{total}} р
        <br>
        <button>Оплатить</button>
    </p>
</div>
